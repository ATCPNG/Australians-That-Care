<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Australians That Care — Student Ledger</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f9fa;--bg3:#f1f3f5;
  --text:#1a1a1a;--text2:#6c757d;--text3:#adb5bd;
  --border:#dee2e6;--border2:#ced4da;
  --success:#198754;--success-bg:#d1e7dd;--success-border:#a3cfbb;
  --warning-bg:#fff3e0;--warning-border:#ffcc80;--warning:#e65100;
  --danger:#dc3545;--danger-bg:#f8d7da;--danger-border:#f1aeb5;
  --info:#0d6efd;--info-bg:#cfe2ff;--info-border:#9ec5fe;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#198754,#0d6efd);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;margin:0 auto 16px}
.login-box h1{font-size:20px;font-weight:600;text-align:center;margin-bottom:4px}
.login-box p{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.role-btn{padding:12px 8px;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.role-btn:hover{border-color:var(--border2);background:var(--bg2)}
.role-btn.selected{border-color:var(--info);background:var(--info-bg)}
.role-btn i{display:block;font-size:22px;margin-bottom:4px;color:var(--text2)}
.role-btn.selected i{color:var(--info)}
.role-btn span{font-size:12px;font-weight:500;color:var(--text)}
.form-row{margin-bottom:12px}
.form-row label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.form-row input{width:100%;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .15s}
.form-row input:focus{border-color:var(--info);box-shadow:0 0 0 3px rgba(13,110,253,.15)}
.login-btn{width:100%;padding:11px;border-radius:var(--radius);border:none;background:#198754;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.login-btn:hover{background:#157347}
.login-err{font-size:12px;color:var(--danger);text-align:center;margin-top:8px;min-height:18px}

/* APP */
.app{display:none;max-width:960px;margin:0 auto;padding:20px 16px}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#198754,#0d6efd);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
.brand h1{font-size:17px;font-weight:600}
.brand p{font-size:12px;color:var(--text2);margin-top:2px}
.brand-right{display:flex;align-items:center;gap:8px}
.role-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;background:var(--info-bg);color:var(--info)}
.btn{padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;font-weight:500;transition:all .15s}
.btn:hover{background:var(--bg2)}
.btn.primary{background:#198754;border-color:#198754;color:#fff}
.btn.primary:hover{background:#157347}

/* INVESTOR VIEW */
.investor-view{}
.inv-header{background:linear-gradient(135deg,#198754,#0d6efd);border-radius:var(--radius-lg);padding:24px;color:#fff;margin-bottom:20px}
.inv-header h2{font-size:22px;font-weight:600;margin-bottom:4px}
.inv-header p{font-size:13px;opacity:.85}
.inv-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:500px){.inv-stats{grid-template-columns:repeat(2,1fr)}}
.inv-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.inv-stat-val{font-size:32px;font-weight:700;color:var(--text)}
.inv-stat-val.g{color:var(--success)}
.inv-stat-val.a{color:#e65100}
.inv-stat-val.r{color:var(--danger)}
.inv-stat-label{font-size:11px;color:var(--text2);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.inv-pipeline{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px}
.inv-pipeline h3{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.pipeline-steps{display:flex;flex-direction:column;gap:8px}
.pipeline-step{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2)}
.pipeline-step-num{width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text2);flex-shrink:0}
.pipeline-step-name{flex:1;font-size:13px;font-weight:500}
.pipeline-step-count{font-size:13px;font-weight:600;color:var(--success)}
.inv-chain{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.inv-chain h3{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chain-note{font-size:12px;color:var(--text2);margin-bottom:12px}
.chain-sample{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.chain-blk{font-family:'SF Mono',monospace;font-size:10px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:3px 8px;color:var(--text2)}
.chain-arr{color:var(--text3);font-size:12px}

/* COORDINATOR VIEW */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:26px;font-weight:600}
.stat-val.g{color:var(--success)}
.stat-val.a{color:#e65100}
.stat-val.r{color:var(--danger)}
.investor-banner{background:var(--info-bg);border:1px solid var(--info-border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#084298}
.search-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-bar input,.search-bar select{padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.search-bar input{flex:1;min-width:160px}
.student-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;transition:box-shadow .2s}
.student-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.student-card.active-card{border-color:#9ec5fe}
.card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;color:#fff}
.student-info{flex:1;min-width:0}
.student-name{font-size:15px;font-weight:600}
.student-meta{font-size:12px;color:var(--text2);margin-top:2px}
.card-right{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.progress-wrap{display:flex;align-items:center;gap:6px}
.progress-bar{width:80px;height:6px;background:var(--bg3);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:var(--success)}
.progress-pct{font-size:12px;color:var(--text2);font-weight:500}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.pill-active{background:var(--info-bg);color:var(--info)}
.pill-complete{background:var(--success-bg);color:var(--success)}
.pill-hold{background:var(--danger-bg);color:var(--danger)}
.chevron{color:var(--text3);transition:transform .2s;font-size:18px}
.chevron.open{transform:rotate(180deg)}
.card-body{display:none;border-top:1px solid var(--border)}
.card-body.open{display:block}
.ms-list{padding:12px 16px;display:flex;flex-direction:column;gap:6px}
.ms{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg)}
.ms.ms-done{border-color:var(--success-border);background:var(--success-bg)}
.ms.ms-fail{border-color:var(--danger-border);background:var(--danger-bg)}
.ms.ms-active{border-color:var(--warning-border);background:var(--warning-bg)}
.ms.ms-locked{opacity:.5}
.ms-num{font-size:11px;color:var(--text3);font-weight:600;min-width:16px;text-align:center;padding-top:6px;flex-shrink:0}
.ms-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ms-icon.done{background:var(--success-bg);color:var(--success)}
.ms-icon.fail{background:var(--danger-bg);color:var(--danger)}
.ms-icon.active{background:var(--warning-bg);color:#e65100}
.ms-icon.locked{background:var(--bg3);color:var(--text3)}
.ms-content{flex:1;min-width:0}
.ms-title{font-size:13px;font-weight:600}
.ms-detail{font-size:12px;color:var(--text2);margin-top:2px}
.ms-hash{font-family:'SF Mono',monospace;font-size:10px;color:var(--text3);margin-top:4px;word-break:break-all}
.ms-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ms-btn{padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.ms-btn.pass{border-color:var(--success-border);color:var(--success);background:var(--success-bg)}
.ms-btn.pass:hover{background:#a3cfbb}
.ms-btn.fail{border-color:var(--danger-border);color:var(--danger);background:var(--danger-bg)}
.ms-btn.fail:hover{background:#f1aeb5}
.attend-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-top:8px}
.lesson{width:100%;aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text3);transition:all .15s}
.lesson.present{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.lesson.absent{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.attend-pct{font-size:12px;font-weight:600;margin-top:5px}
.attend-pct.ok{color:var(--success)}
.attend-pct.warn{color:var(--danger)}
.chain-bar{padding:10px 16px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px}
.chain-label{color:var(--text2);font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.chain-blocks{display:flex;flex-wrap:wrap;align-items:center;gap:4px}
.chain-block{font-family:'SF Mono',monospace;font-size:10px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:3px 7px;color:var(--text2)}
.chain-arrow{color:var(--text3)}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
.empty i{font-size:48px;color:var(--text3);display:block;margin-bottom:12px}
.add-btn{width:100%;padding:12px;border:2px dashed var(--border2);border-radius:var(--radius-lg);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px;transition:all .15s;font-weight:500}
.add-btn:hover{background:var(--bg2)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:17px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row{margin-bottom:10px}
.form-row label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.form-row input,.form-row select{width:100%;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.form-row input:focus,.form-row select:focus{border-color:var(--info);box-shadow:0 0 0 3px rgba(13,110,253,.15)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text2);font-size:14px}
.loading i{font-size:32px;display:block;margin-bottom:8px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.footer{text-align:center;margin-top:28px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo"><i class="ti ti-heartbeat"></i></div>
    <h1>Australians That Care</h1>
    <p>PNG Student Pathway Ledger — select your role to continue</p>
    <div class="role-grid">
      <button class="role-btn selected" onclick="selectRole('coordinator')" id="role-coordinator">
        <i class="ti ti-clipboard-list"></i><span>Coordinator</span>
      </button>
      <button class="role-btn" onclick="selectRole('nun')" id="role-nun">
        <i class="ti ti-hand-finger"></i><span>PNG Sister</span>
      </button>
      <button class="role-btn" onclick="selectRole('investor')" id="role-investor">
        <i class="ti ti-chart-bar"></i><span>Investor</span>
      </button>
      <button class="role-btn" onclick="selectRole('admin')" id="role-admin">
        <i class="ti ti-settings"></i><span>Admin</span>
      </button>
    </div>
    <div class="form-row"><label>Password</label><input type="password" id="login-pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="top-bar">
    <div class="brand">
      <div class="brand-logo"><i class="ti ti-heartbeat"></i></div>
      <div>
        <h1>Australians That Care</h1>
        <p>PNG Student Pathway Ledger · Employment via Doctors That Care</p>
      </div>
    </div>
    <div class="brand-right">
      <span class="role-badge" id="role-label">Coordinator</span>
      <button class="btn" onclick="signOut()"><i class="ti ti-logout"></i> Sign out</button>
    </div>
  </div>
  <div id="app-content"><div class="loading"><i class="ti ti-loader-2"></i>Loading ledger...</div></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3><i class="ti ti-user-plus" style="color:var(--success)"></i> Enrol new student</h3>
    <div class="form-grid">
      <div class="form-row" style="grid-column:span 2"><label>Full name *</label><input id="f-name" placeholder="e.g. Mary Kila"></div>
      <div class="form-row"><label>Age *</label><input id="f-age" type="number" min="18" max="45" placeholder="25"></div>
      <div class="form-row"><label>Province *</label><select id="f-province">
        <option>Western Highlands</option><option>Eastern Highlands</option><option>Morobe</option>
        <option>Gulf</option><option>Central</option><option>Milne Bay</option>
        <option>Madang</option><option>East Sepik</option><option>Western</option><option>Oro</option>
        <option>Southern Highlands</option><option>Simbu</option><option>Manus</option>
      </select></div>
      <div class="form-row" style="grid-column:span 2"><label>Level of education *</label><select id="f-edu">
        <option>Grade 10</option><option>Grade 12</option><option>Certificate II</option><option>Diploma</option>
      </select></div>
      <div class="form-row" style="grid-column:span 2"><label>Selected by (sister's name) *</label><input id="f-nun" placeholder="e.g. Sister Agnes Mary"></div>
      <div class="form-row"><label>Selection date *</label><input id="f-date" type="date"></div>
      <div class="form-row"><label>Convent / parish</label><input id="f-parish" placeholder="e.g. Mt Hagen Convent"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addStudent()"><i class="ti ti-check"></i> Confirm enrolment</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://cfckarzxrrwwhelftmag.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmY2thcnp4cnJ3d2hlbGZ0bWFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMjE2NDEsImV4cCI6MjA5NDc5NzY0MX0.YgkcpPvHHcMVHQP92snZT4I-dVjsm3L0_D4QgANjFhk';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const PASSWORDS={coordinator:'atc2026',nun:'png2026',investor:'invest2026',admin:'admin2026'};
const AVATARBG=['#198754','#0d6efd','#6f42c1','#d63384','#fd7e14','#20c997','#dc3545','#0dcaf0'];
const MILESTONES=[
  {id:0,title:'Selected by nuns in PNG',icon:'ti-hand-finger',party:'Sister / Convent PNG',type:'auto'},
  {id:1,title:'Medical assessment',icon:'ti-stethoscope',party:'Medical officer',type:'passfail'},
  {id:2,title:'Numeracy & literacy test',icon:'ti-abc',party:'Testing officer',type:'passfail'},
  {id:3,title:'Aged care course — attendance (30 lessons)',icon:'ti-school',party:'Course coordinator',type:'attendance'},
  {id:4,title:'Theory examination — Certificate III aged care',icon:'ti-clipboard-text',party:'RTO examiner',type:'passfail'},
  {id:5,title:'Passport established',icon:'ti-id',party:'PNG passport office',type:'verify'},
  {id:6,title:'Australian visa approved',icon:'ti-world',party:'Dept of Home Affairs',type:'verify'},
  {id:7,title:'Flight tickets issued',icon:'ti-plane',party:'Australians That Care coordinator',type:'verify'},
  {id:8,title:'Australian bank account opened',icon:'ti-building-bank',party:'Bank representative',type:'verify'},
  {id:9,title:'120 hrs practical placement',icon:'ti-heart-handshake',party:'Placement supervisor',type:'passfail'},
  {id:10,title:'Certificate III aged care — Australian certification',icon:'ti-certificate',party:'ASQA / RTO',type:'verify'},
  {id:11,title:'Employment begins — Doctors That Care',icon:'ti-briefcase-medical',party:'Doctors That Care HR',type:'verify'},
];

let currentRole=null;
let students=[];
let openCards={};

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

function selectRole(r){
  currentRole=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('role-'+r).classList.add('selected');
}

function doLogin(){
  const pw=document.getElementById('login-pw').value;
  const err=document.getElementById('login-err');
  if(!currentRole){err.textContent='Please select a role';return;}
  if(pw!==PASSWORDS[currentRole]){err.textContent='Incorrect password';return;}
  err.textContent='';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('role-label').textContent=
    currentRole==='coordinator'?'Coordinator':currentRole==='nun'?'PNG Sister':currentRole==='investor'?'Token Investor':'Admin';
  loadData();
}

function signOut(){
  currentRole=null;students=[];openCards={};
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-pw').value='';
}

function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=ok?'#198754':'#dc3545';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}

function openModal(){document.getElementById('modal').classList.add('open');document.getElementById('f-name').focus();}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

function now(){return new Date().toISOString();}
function nowDisp(){return new Date().toISOString().slice(0,19).replace('T',' ')+' UTC';}
function initials(n){return n.split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function getStatus(s){
  if(s.milestones&&s.milestones[11]?.status==='done') return 'complete';
  if(s.milestones&&s.milestones.some(m=>m.status==='fail')) return 'hold';
  return 'active';
}
function getProgress(s){
  if(!s.milestones) return 0;
  return Math.round((s.milestones.filter(m=>m.status==='done').length/12)*100);
}

async function loadData(){
  document.getElementById('app-content').innerHTML='<div class="loading"><i class="ti ti-loader-2"></i>Loading student ledger...</div>';
  try{
    const{data:studs,error:e1}=await sb.from('students').select('*').order('created_at',{ascending:false});
    if(e1) throw e1;
    const{data:ms,error:e2}=await sb.from('milestones').select('*').order('ms_id');
    if(e2) throw e2;
    const{data:att,error:e3}=await sb.from('attendance').select('*');
    if(e3) throw e3;
    students=studs.map(s=>{
      const sMilestones=MILESTONES.map((_,i)=>{
        const found=ms.find(m=>m.student_id===s.id&&m.ms_id===i);
        return found||{msId:i,status:i===0?'done':'locked',data:{},hash:null,prev_hash:null,timestamp_verified:null,note:null};
      });
      const sAtt=Array(30).fill(null);
      att.filter(a=>a.student_id===s.id).forEach(a=>{sAtt[a.lesson_index]=a.present;});
      return{...s,milestones:sMilestones,attendance:sAtt};
    });
    render();
  }catch(err){
    console.error(err);
    if(err.message&&err.message.includes('does not exist')){
      document.getElementById('app-content').innerHTML=`
        <div class="empty">
          <i class="ti ti-database-x"></i>
          <strong>Database tables not set up yet</strong>
          <p style="margin-top:8px;font-size:13px">Please run the SQL setup script in your Supabase dashboard.<br>Go to Supabase → SQL Editor → paste the setup script → Run.</p>
        </div>`;
    } else {
      document.getElementById('app-content').innerHTML=`<div class="empty"><i class="ti ti-alert-circle"></i>Error loading data: ${err.message}</div>`;
    }
  }
}

async function addStudent(){
  const name=document.getElementById('f-name').value.trim();
  const age=parseInt(document.getElementById('f-age').value);
  const province=document.getElementById('f-province').value;
  const edu=document.getElementById('f-edu').value;
  const nun=document.getElementById('f-nun').value.trim();
  const date=document.getElementById('f-date').value;
  const parish=document.getElementById('f-parish').value.trim();
  if(!name||!age||!nun||!date){toast('Please fill all required fields',false);return;}
  const genesisHash=await sha256(name+age+province+nun+date+Math.random());
  const firstHash=await sha256(genesisHash+'0'+JSON.stringify({name,age,province,edu,nun,date,parish})+'0000000000000000');
  const colorIdx=Math.floor(Math.random()*AVATARBG.length);
  const{data:stu,error:e1}=await sb.from('students').insert({name,age,province,education:edu,nun,parish,selection_date:date,genesis_hash:genesisHash,color_idx:colorIdx}).select().single();
  if(e1){toast('Error enrolling student: '+e1.message,false);return;}
  const msRows=MILESTONES.map((m,i)=>({
    student_id:stu.id,ms_id:i,
    status:i===0?'done':i===1?'active':'locked',
    data:i===0?{name,age,province,education:edu,nun,date,parish}:{},
    hash:i===0?firstHash:null,
    prev_hash:i===0?'0000000000000000':i===1?firstHash:null,
    timestamp_verified:i===0?now():null,
    note:i===0?`Selected by ${nun}${parish?' ('+parish+')':''}. Province: ${province}. Education: ${edu}.`:null
  }));
  const{error:e2}=await sb.from('milestones').insert(msRows);
  if(e2){toast('Error creating milestones: '+e2.message,false);return;}
  closeModal();
  toast(`${name} enrolled — genesis block sealed ✓`);
  ['f-name','f-age','f-nun','f-parish','f-date'].forEach(id=>document.getElementById(id).value='');
  await loadData();
}

async function verifyMs(sid,mid,pass){
  const s=students.find(x=>x.id===sid);
  const ms=s.milestones[mid];
  const prev=s.milestones[mid-1];
  const prevHash=prev?.hash||s.genesis_hash;
  const data={result:pass?'pass':'fail',verifiedAt:nowDisp(),role:currentRole};
  const hash=await sha256(s.genesis_hash+mid+JSON.stringify(data)+prevHash);
  const{error:e1}=await sb.from('milestones').update({
    status:pass?'done':'fail',data,hash,prev_hash:prevHash,
    timestamp_verified:now(),
    note:MILESTONES[mid].type==='passfail'?(pass?'Passed ✓':'Failed — pathway on hold'):'Completed ✓',
    updated_at:now()
  }).eq('student_id',sid).eq('ms_id',mid);
  if(e1){toast('Error: '+e1.message,false);return;}
  if(pass&&mid+1<12){
    await sb.from('milestones').update({status:'active',prev_hash:hash,updated_at:now()}).eq('student_id',sid).eq('ms_id',mid+1);
  }
  toast(pass?`Milestone ${mid+1} verified and sealed ✓`:`Milestone ${mid+1} marked as fail`,pass);
  await loadData();
}

async function toggleLesson(sid,idx){
  const s=students.find(x=>x.id===sid);
  const cur=s.attendance[idx];
  const next=cur===null?true:cur===true?false:null;
  if(next===null){
    await sb.from('attendance').delete().eq('student_id',sid).eq('lesson_index',idx);
  } else {
    await sb.from('attendance').upsert({student_id:sid,lesson_index:idx,present:next,updated_at:now()},{onConflict:'student_id,lesson_index'});
  }
  s.attendance[idx]=next;
  const attended=s.attendance.filter(x=>x===true).length;
  const marked=s.attendance.filter(x=>x!==null).length;
  const pct=marked>0?Math.round((attended/30)*100):0;
  if(marked===30){
    const pass=pct>=80;
    const ms=s.milestones[3];
    const prevHash=ms.prev_hash||s.genesis_hash;
    const hash=await sha256(s.genesis_hash+'3'+JSON.stringify({attended,pct})+prevHash);
    await sb.from('milestones').update({
      status:pass?'done':'fail',data:{attended,total:30,pct},hash,prev_hash:prevHash,
      timestamp_verified:now(),
      note:`${attended} of 30 lessons attended (${pct}%) ${pass?'✓':'— below 80% minimum'}`,
      updated_at:now()
    }).eq('student_id',sid).eq('ms_id',3);
    if(pass){
      await sb.from('milestones').update({status:'active',prev_hash:hash,updated_at:now()}).eq('student_id',sid).eq('ms_id',4);
    }
    toast(pass?`Attendance sealed — ${pct}% ✓`:`Attendance sealed — ${pct}% — below 80% minimum`,pass);
    await loadData();
  } else {
    render();
  }
}

function renderInvestorView(){
  const total=students.length;
  const active=students.filter(s=>getStatus(s)==='active').length;
  const complete=students.filter(s=>getStatus(s)==='complete').length;
  const hold=students.filter(s=>getStatus(s)==='hold').length;
  const pipelineCounts=MILESTONES.map((_,i)=>students.filter(s=>s.milestones&&s.milestones[i]?.status==='done').length);
  const allHashes=students.flatMap(s=>(s.milestones||[]).filter(m=>m.hash).slice(0,3));
  return `
    <div class="investor-view">
      <div class="inv-header">
        <h2><i class="ti ti-shield-check" style="margin-right:8px"></i>Australians That Care — Token Investor Dashboard</h2>
        <p>Blockchain-verified student pathway from PNG selection to Australian aged care employment · Partner: Doctors That Care</p>
      </div>
      <div class="inv-stats">
        <div class="inv-stat"><div class="inv-stat-val">${total}</div><div class="inv-stat-label">Total enrolled</div></div>
        <div class="inv-stat"><div class="inv-stat-val a">${active}</div><div class="inv-stat-label">In training</div></div>
        <div class="inv-stat"><div class="inv-stat-val g">${complete}</div><div class="inv-stat-label">Employed</div></div>
        <div class="inv-stat"><div class="inv-stat-val r">${hold}</div><div class="inv-stat-label">On hold</div></div>
      </div>
      <div class="inv-pipeline">
        <h3><i class="ti ti-list-check"></i> Pipeline — students at each milestone</h3>
        <div class="pipeline-steps">
          ${MILESTONES.map((m,i)=>`
            <div class="pipeline-step">
              <div class="pipeline-step-num">${i+1}</div>
              <div class="pipeline-step-name"><i class="ti ${m.icon}" style="font-size:13px;margin-right:6px"></i>${m.title}</div>
              <div class="pipeline-step-count">${pipelineCounts[i]} student${pipelineCounts[i]!==1?'s':''} verified</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="inv-chain">
        <h3><i class="ti ti-link"></i> Blockchain verification</h3>
        <p class="chain-note">Every milestone is sealed with a SHA-256 cryptographic hash linked to the previous block. No record can be altered without breaking the chain. Verified blocks: <strong>${allHashes.length}</strong></p>
        ${allHashes.length>0?`<div class="chain-sample">${allHashes.slice(0,8).map((m,i)=>`${i>0?'<span class="chain-arr">→</span>':''}<span class="chain-blk">#${m.ms_id} ${m.hash?.slice(0,8)}...</span>`).join('')}${allHashes.length>8?'<span class="chain-arr">→</span><span class="chain-blk">+${allHashes.length-8} more</span>':''}</div>`:'<p style="font-size:12px;color:var(--text3)">No verified blocks yet — enrol students to begin the chain</p>'}
      </div>
      <div class="footer"><strong>Australians That Care</strong> · Investor view — aggregate data only · Individual student data protected under the Australian Privacy Act 1988</div>
    </div>`;
}

function renderCoordinatorView(){
  const total=students.length,active=students.filter(s=>getStatus(s)==='active').length;
  const complete=students.filter(s=>getStatus(s)==='complete').length,hold=students.filter(s=>getStatus(s)==='hold').length;
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const f=document.getElementById('filterStatus')?.value||'';
  const canEnrol=currentRole==='nun'||currentRole==='admin'||currentRole==='coordinator';
  let list=students.filter(s=>{
    if(f&&getStatus(s)!==f) return false;
    if(q&&!s.name.toLowerCase().includes(q)&&!s.province.toLowerCase().includes(q)) return false;
    return true;
  });
  const msHtml=(s)=>s.milestones.map((ms,i)=>{
    const def=MILESTONES[i];
    const sc=ms.status==='done'?'ms-done':ms.status==='fail'?'ms-fail':ms.status==='active'?'ms-active':'ms-locked';
    const ic=ms.status==='done'?'done':ms.status==='fail'?'fail':ms.status==='active'?'active':'locked';
    const ii=ms.status==='done'?'ti-check':ms.status==='fail'?'ti-x':ms.status==='active'?'ti-clock':'ti-lock';
    let detail=ms.note||`Verified by: ${def.party}`;
    if(ms.timestamp_verified) detail+=` · ${new Date(ms.timestamp_verified).toISOString().slice(0,16).replace('T',' ')} UTC`;
    let extra='';
    if(i===3&&ms.status!=='locked'){
      const attended=s.attendance.filter(x=>x===true).length;
      const marked=s.attendance.filter(x=>x!==null).length;
      const pctA=marked>0?Math.round((attended/30)*100):0;
      extra+=`<div class="attend-grid">${s.attendance.map((a,li)=>`<div class="lesson ${a===true?'present':a===false?'absent':''}" onclick="toggleLesson('${s.id}',${li})" title="Lesson ${li+1}">${li+1}</div>`).join('')}</div>`;
      extra+=`<div class="attend-pct ${pctA>=80?'ok':'warn'}">${attended} of 30 lessons attended (${pctA}%) — minimum 80% required</div>`;
    }
    let actions='';
    if(ms.status==='active'&&i!==3){
      if(def.type==='passfail'){
        actions=`<div class="ms-actions"><button class="ms-btn pass" onclick="verifyMs('${s.id}',${i},true)"><i class="ti ti-check"></i> Pass</button><button class="ms-btn fail" onclick="verifyMs('${s.id}',${i},false)"><i class="ti ti-x"></i> Fail</button></div>`;
      } else if(def.type==='verify'){
        actions=`<div class="ms-actions"><button class="ms-btn pass" onclick="verifyMs('${s.id}',${i},true)"><i class="ti ti-check"></i> Mark complete</button></div>`;
      }
    }
    if(i===3&&ms.status==='active'){
      actions=`<div class="ms-actions" style="margin-top:6px"><span style="font-size:11px;color:var(--text2)">Click lesson squares to mark present / absent. Chain seals when all 30 are recorded.</span></div>`;
    }
    const hashLine=ms.hash?`<div class="ms-hash"><i class="ti ti-link" style="font-size:10px"></i> ${ms.hash} ← ${(ms.prev_hash||'').slice(0,10)}...</div>`:'';
    return `<div class="ms ${sc}">
      <span class="ms-num">${i+1}</span>
      <div class="ms-icon ${ic}"><i class="ti ${ii}"></i></div>
      <div class="ms-content">
        <div class="ms-title"><i class="ti ${def.icon}" style="font-size:13px;margin-right:4px"></i>${def.title}</div>
        <div class="ms-detail">${detail}</div>
        ${extra}${hashLine}${actions}
      </div>
    </div>`;
  }).join('');
  const chainHtml=(s)=>{
    const chain=s.milestones.filter(m=>m.hash);
    if(!chain.length) return '';
    return `<div class="chain-bar"><div class="chain-label"><i class="ti ti-link"></i> Verified chain (${chain.length} block${chain.length!==1?'s':''})</div>
      <div class="chain-blocks">${chain.map((m,ci)=>`${ci>0?'<span class="chain-arrow">→</span>':''}<span class="chain-block" title="${m.hash}">#${m.ms_id} ${(m.hash||'').slice(0,8)}...</span>`).join('')}</div></div>`;
  };
  return `
    <div class="stats">
      <div class="stat"><div class="stat-label">Total enrolled</div><div class="stat-val">${total}</div></div>
      <div class="stat"><div class="stat-label">In progress</div><div class="stat-val a">${active}</div></div>
      <div class="stat"><div class="stat-label">Employed</div><div class="stat-val g">${complete}</div></div>
      <div class="stat"><div class="stat-label">On hold</div><div class="stat-val r">${hold}</div></div>
    </div>
    <div class="investor-banner"><i class="ti ti-shield-check" style="font-size:20px;flex-shrink:0"></i>
      <div>All milestones are cryptographically hashed and chain-linked. Each step must be verified before the next unlocks. Records are immutable once sealed.</div>
    </div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search name or province..." oninput="render()">
      <select id="filterStatus" onchange="render()">
        <option value="">All students</option>
        <option value="active">In progress</option>
        <option value="complete">Employed</option>
        <option value="hold">On hold</option>
      </select>
    </div>
    ${list.length===0?`<div class="empty"><i class="ti ti-users"></i>${students.length?'No students match your search.':'No students enrolled yet.'}</div>`:
    list.map(s=>{
      const pct=getProgress(s),os=getStatus(s);
      const pillC=os==='complete'?'pill-complete':os==='hold'?'pill-hold':'pill-active';
      const pillT=os==='complete'?'Employed':os==='hold'?'On hold':'In progress';
      const bg=AVATARBG[s.color_idx||0];
      const isOpen=openCards[s.id];
      return `<div class="student-card ${os==='active'?'active-card':''}">
        <div class="card-header" onclick="toggleCard('${s.id}')">
          <div class="avatar" style="background:${bg}">${initials(s.name)}</div>
          <div class="student-info">
            <div class="student-name">${s.name}</div>
            <div class="student-meta">Age ${s.age} · ${s.province} · ${s.education} · Selected by ${s.nun}${s.parish?' ('+s.parish+')':''}</div>
          </div>
          <div class="card-right">
            <div class="progress-wrap">
              <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
              <span class="progress-pct">${pct}%</span>
            </div>
            <span class="pill ${pillC}">${pillT}</span>
            <i class="ti ti-chevron-down chevron ${isOpen?'open':''}" id="chev-${s.id}"></i>
          </div>
        </div>
        <div class="card-body ${isOpen?'open':''}">
          <div class="ms-list">${msHtml(s)}</div>
          ${chainHtml(s)}
        </div>
      </div>`;
    }).join('')}
    ${canEnrol?`<button class="add-btn" onclick="openModal()"><i class="ti ti-plus"></i> Enrol new student</button>`:''}
    <div class="footer"><strong>Australians That Care</strong> · Student pathway ledger · Employment via <strong>Doctors That Care</strong> · All data cryptographically sealed</div>`;
}

function render(){
  const content=document.getElementById('app-content');
  if(currentRole==='investor'){
    content.innerHTML=renderInvestorView();
  } else {
    content.innerHTML=renderCoordinatorView();
  }
}

function toggleCard(id){openCards[id]=!openCards[id];render();}

window.addEventListener('load',()=>{
  localStorage.removeItem('atc_students');
});
</script>
